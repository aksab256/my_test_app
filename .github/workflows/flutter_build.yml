name: Build Rabia Ahla (APK & AAB)

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: |
          flutter clean
          flutter pub get

      - name: Decode Keystore
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          echo "$RELEASE_KEYSTORE_BASE64" | base64 --decode > android/app/release-keystore.jks

      - name: Build APK & AAB
        env:
          STORE_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ALIAS_NAME }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD_ALIAS }}
          KEYSTORE_PATH: "release-keystore.jks"
        run: |
          flutter build apk --release
          flutter build appbundle --release

      - name: Upload Signed APK
        uses: actions/upload-artifact@v4
        with:
          name: RabiaAhla-Release-APK
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Upload Signed AAB (Google Play)
        uses: actions/upload-artifact@v4
        with:
          name: RabiaAhla-Release-AAB-Bundle
          path: build/app/outputs/bundle/release/app-release.aab

      - name: Verify Build Success
        run: |
          echo "Checking if files exist..."
          ls -lh build/app/outputs/flutter-apk/app-release.apk
          ls -lh build/app/outputs/bundle/release/app-release.aab
          echo "Builds completed and verified successfully!"